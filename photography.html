document.addEventListener('DOMContentLoaded', function() {
    const grid = document.getElementById('photoGrid');
    images.forEach(img => {
        const div = document.createElement('div');
        div.className = 'w3-third';
        div.innerHTML = `
            <a href="files/images_full/${img.id}.jpg" data-fancybox="gallery" class="lightbox" data-caption="${img.caption} &copy; André Baumgart">
                <img class="lazy-load" data-src="files/images_small/${img.id}t.jpg" style="padding:1px;width:100%" alt="">
            </a>
        `;
        grid.appendChild(div);
    });
});

// Lazy loading
document.addEventListener("DOMContentLoaded", () => {
    const lazyImages = document.querySelectorAll('.lazy-load');
    const config = {
        root: null,
        rootMargin: '200px',
        threshold: 0.1
    };

    let observer = new IntersectionObserver((entries, self) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const img = entry.target;
                img.src = img.dataset.src;
                img.onload = () => img.classList.add('loaded');
                if (img.complete) {
                    img.classList.add('loaded');
                }
                self.unobserve(img);
            }
        });
    }, config);
    lazyImages.forEach(image => observer.observe(image));
});
